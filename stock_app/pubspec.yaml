name: stock_app
description: "Barcode-driven stock management for physical & WooCommerce stores"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # Database
  drift: ^2.22.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.0
  path: ^1.9.0
  # State management
  flutter_riverpod: ^2.6.0
  # Routing
  go_router: ^15.1.0
  # Barcode
  mobile_scanner: ^6.0.0
  barcode_widget: ^2.0.4
  # Networking
  dio: ^5.7.0
  # Utilities
  intl: ^0.20.0
  google_fonts: ^6.2.0
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.22.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true
